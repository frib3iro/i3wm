# i3blocks configuration file
#
# The i3blocks man page describes the usage of the binary,
# and its website describes the configuration:
#
#     https://vivien.github.io/i3blocks


# Global properties
separator=true
separator_block_width=15

# Spotify icon \uF1BC
[spotify]
label= 
command=/home/fabio/.config/i3/i3blocks/spotify.py
color=#81b71a
interval=5

[arch-update]
command=/home/fabio/.config/i3/i3blocks/arch-update
interval=3600
markup=pango
#LABEL=Updates:

[documentation]
full_text=i3wm
website=https://i3wm.org/
command=xdg-open "$website"
color=#bd93f9

[time]
color=#8be9fd
command=date '+%d/%m/%Y %H:%M '
interval=1

